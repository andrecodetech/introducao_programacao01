<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nome = prompt("Insira o seu nome");
        //console.log("Nome:" + nome);
        document.write("Seu nome é:" + nome + "<br>");

        let resposta = confirm("Confirma o cadastro do seu nome?");
        if (resposta == true) {
            document.write ("Cadastro Feito" + nome);
        }
        else {
            document.write ("Cadastro não realizado");
        }
    </script>    
</body>
</html>
